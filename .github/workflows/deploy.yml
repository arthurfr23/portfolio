name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # rebuild diário (06:00 UTC) para atualizar os feeds YouTube/Medium/GitHub
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # GITHUB_TOKEN é injetado automaticamente (rate limit elevado p/ leitura pública).
          # GH_API_TOKEN é opcional: PAT fine-grained se quiser controle/escopo próprio.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
